<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f3f4f6;
            margin-top: 50px;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            margin: 5px;
            padding: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Customer Churn Prediction</h1>
    <form action="/predict" method="post">
        <input type="text" name="AccountWeeks" placeholder="AccountWeeks" required><br>
        <input type="text" name="ContractRenewal" placeholder="ContractRenewal" required><br>
        <input type="text" name="DataPlan" placeholder="DataPlan" required><br>
        <input type="text" name="DataUsage" placeholder="DataUsage" required><br>
        <input type="text" name="CustServCalls" placeholder="CustServCalls" required><br>
        <input type="text" name="DayMins" placeholder="DayMins" required><br>
        <input type="text" name="DayCalls" placeholder="DayCalls" required><br>
        <input type="text" name="MonthlyCharge" placeholder="MonthlyCharge" required><br>
        <input type="text" name="OverageFee" placeholder="OverageFee" required><br>
        <input type="text" name="RoamMins" placeholder="RoamMins" required><br>
        <button type="submit">Predict</button>
    </form>
    <h2>{{ prediction_text }}</h2>
</body>
</html>
